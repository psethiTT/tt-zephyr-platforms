name: Metal 🤘

on:
  pull_request:
    types:
      - labeled
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  should-run:
    if: >
      github.event_name == 'schedule'          ||
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'metal-tests'
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Metal tests will run."

  build-fw-artifact:
    needs: should-run
    uses: ./.github/workflows/build-fw.yml
    secrets:
      SIGNATURE_KEY: ${{ secrets.SIGNATURE_KEY }}

  # Generate a matrix containing the boards with a Metal target
  generate-matrix:
    needs: should-run
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen-matrix
        run: |
          echo "matrix=$(jq -c '[.[][] | select(has("metal-image"))]' .github/ci_boards.json)" | tee -a $GITHUB_OUTPUT

  metal-test:
    name: Metal Test on ${{ matrix.config.board }}
    needs: [build-fw-artifact, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.config.board }}
    container:
      image: ${{ matrix.config.metal-image }}
      volumes:
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /dev/hugepages:/dev/hugepages
        - /opt/tenstorrent/hf-models/:/opt/tenstorrent/hf-models/
        - /opt/tenstorrent/kmd-builds/:/opt/tenstorrent/kmd-builds/
      options: ${{ matrix.config.metal-options }}
    env:
      ARCH_NAME: ${{ matrix.config.arch-name }}
      HOME: /home/user/tt-metal
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.HOME }}
    steps:
      - name: Select tt-kmd
        shell: bash
        run: |
          sudo apt update || true
          sudo apt install -y kmod
          sudo rmmod tenstorrent
          sudo insmod /opt/tenstorrent/kmd-builds/${{ matrix.config.kmd_build }}/tenstorrent.ko
          echo "tt-kmd version: $(cat /sys/module/tenstorrent/version)"

      - name: Install ipmitool
        shell: bash
        run: |
          sudo apt update || true
          sudo apt install -y ipmitool

      - name: Set model env
        shell: bash
        run: |
          if [[ "${{ matrix.config.board }}" == "p300a" ]]; then
            echo "HF_MODEL=/opt/tenstorrent/hf-models/meta-llama/Llama-3.1-8B/" >> $GITHUB_ENV
          elif [[ "${{ matrix.config.board }}" == "bh-galaxy" || "${{ matrix.config.board }}" == "loudbox" || "${{ matrix.config.board }}" == "quietbox2" ]]; then
            echo "HF_MODEL=/opt/tenstorrent/hf-models/meta-llama/Llama-3.3-70B-Instruct/" >> $GITHUB_ENV
            echo "LLAMA_DIR=/opt/tenstorrent/hf-models/meta-llama/Llama-3.3-70B-Instruct/" >> $GITHUB_ENV
          fi

      - id: mkdir-home-user-tt-metal
        run: |
          mkdir -p $HOME
      - name: Download the latest firmware bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-fw-artifact.outputs.combined-fwbundle-artifact }}
          path: ${{ env.HOME }}
      - name: Flash the firmware
        run: |
          python -m venv .env
          source .env/bin/activate
          pip install tt-flash==3.10.0
          tt-flash $HOME/fw_pack-*.fwbundle --force
          tt-smi -r
      - name: Patch Test Command
        run: |
          # Patch whisper demo test to run with CI=false to skip the performance checks.
          # These tests fail on syseng CI because the runners have different configurations
          # than metal CI systems.
          sed -i 's/pytest\(.*\)test_demo_for_conditional_generation/CI=false pytest\1test_demo_for_conditional_generation/g' \
            dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh
          if [ "${{ matrix.config.board }}" == "p300a" ]; then
            # We enable the checks serves as a workaround for SYS-2705, where
            # P300 cards have different outputs on the first run after cold boot.
            SEARCH="echo \"\[upstream-tests\] Running BH upstream didt tests\""
            INSERT="    pytest tests/didt/test_resnet_conv.py::test_resnet_conv -k \"all\" --didt-workload-iterations 100 --determinism-check-interval 0"
            sed -i "/$SEARCH/a$INSERT" dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh
          fi

          # On loudbox/quietbox2 the upstream script hardcodes data_parallel_devices to the
          # mesh size, which replicates the 70B weights on every device and OOMs. Force
          # data_parallel=1 so the mesh is used as a single tensor-parallel group instead.
          if [ "${{ matrix.config.board }}" == "loudbox" ] || [ "${{ matrix.config.board }}" == "quietbox2" ]; then
            sed -i 's/--data_parallel "\$data_parallel_devices"/--data_parallel 1/g' \
              dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh
            sed -i 's/-k "performance and ci-32" --data_parallel 1 --timeout 1200/-k "performance and ci-32" --data_parallel 1 --timeout 3600/' \
              dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh

            # Bump every Llama-3.3-70B entry in trace_region_config.py to 128 MiB.
            # tt_metal's conftest reads this dict and overrides the parametrized
            # trace_region_size; the configured 80MB / 84MB values are too tight
            # for the TP=8 / batch=32 / ci-32 trace on loudbox/quietbox2.
            sed -i -E '/"Llama-3\.3-70B":/,/},/ s/(":[[:space:]]+)[0-9]+/\1134217728/' \
              models/tt_transformers/demo/trace_region_config.py
            sed -n '/"Llama-3\.3-70B":/,/},/p' models/tt_transformers/demo/trace_region_config.py
          fi

          # Patch tests to remove determinism checks, which are only reliable
          # on metal CI fleets
          sed -i 's/--determinism-check-interval 1/--determinism-check-interval 0/g' \
            dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh

          # To verify patch was applied
          cat dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh

      # Keep the network alive by periodically pulling tenstorrent.com.
      # This prevents a bug in the container runtime where the network interface can
      # drop after a period of inactivity, which would cause our tests to fail.
      - name: Network keepalive
        id: network-keepalive
        background: true
        run: |
          while true; do curl --no-progress-meter -o /dev/null https://tenstorrent.com; sleep 10; done

      - name: Run Container Test
        timeout-minutes: 120
        run: |
          dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh ${{ matrix.config.metal-target }} 2>&1 | tee /tmp/container_test_output.log

      - name: Stop network keepalive
        if: ${{ always() }}
        cancel: network-keepalive

      - name: Upload Test Output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: metal-test-${{ matrix.config.board }}-output
          path: /tmp/container_test_output.log

      - name: cleanup
        if: ${{ always() }}
        run: |
          # Clean out metal
          rm -f $HOME/fw_pack-*.fwbundle
