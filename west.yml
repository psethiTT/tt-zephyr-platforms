      revision: 68672ece76e299ae6f1711586fb4756390ffe574
      import:
        name-allowlist:
          - cmsis_6
          - hal_stm32
          - libmctp
          - mbedtls
          - mcuboot
          - nanopb
          - segger
          - tf-psa-crypto
