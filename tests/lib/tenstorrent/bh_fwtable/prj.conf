# Test framework
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Subsystems the driver depends on
CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_NANOPB=y
CONFIG_TT_BOOT_FS=y

# Driver under test
CONFIG_BH_FWTABLE=y

# Logs — helpful while bringing this up; can lower later
CONFIG_LOG=y
CONFIG_BH_FWTABLE_LOG_LEVEL_DBG=y