sample:
  name: DMFW
common:
  sysbuild: true
  platform_allow:
    - tt_blackhole@p100a/tt_blackhole/dmc
    - tt_blackhole@p150a/tt_blackhole/dmc
    - tt_blackhole@p300a/tt_blackhole/dmc
    - tt_blackhole@orion_slt/tt_blackhole/dmc
  harness: console
  harness_config:
    type: one_line
    regex:
      - "DMFW VERSION (.*)"
tests:
  sample.app:
    extra_configs:
      - CONFIG_DMC_RUN_SMBUS_TESTS=y
    tags: e2e
  sample.app.native_sim_build:
    platform_allow:
      - native_sim
    sysbuild: false
    build_only: true
    tags:
      - build
      - native_sim
      - build-ci
