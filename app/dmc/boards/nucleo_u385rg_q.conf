# Nucleo U385RG-Q: mirror native_sim DMC setup with emulated BH ARC plumbing.
CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_SPI=y
CONFIG_SPI_EMUL=y

# SMBus support
CONFIG_SMBUS=y
CONFIG_SMBUS_EMUL=y
CONFIG_I2C_TARGET=y
CONFIG_SMBUS_TARGET=y
CONFIG_CRC=y

# Use real bh_arc command path
CONFIG_TT_BH_ARC=y
CONFIG_TT_BH_ARC_EMUL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_EMUL=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_WATCHDOG=y
CONFIG_WDT_TT_BH=y

# Keep console/shell on the board's default UART routing.
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y
# CONFIG_LOG_BACKEND_RINGBUF=n

CONFIG_TT_BIST=n
