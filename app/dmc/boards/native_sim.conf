# Native simulator requires emulation framework for i2c@100
CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_SPI=y
CONFIG_SPI_EMUL=y

# SMBus support for simulator (using emulated SMBus on emulated I2C)
CONFIG_SMBUS=y
CONFIG_SMBUS_EMUL=y
CONFIG_I2C_TARGET=y
CONFIG_SMBUS_TARGET=y
CONFIG_CRC=y
CONFIG_TT_BH_ARC=y
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_EMUL=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_WATCHDOG=y
CONFIG_WDT_TT_BH=y

# Shell requires an explicit backend; native_sim works with serial console.
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_SHELL_PROMPT_UART="sim-tt:~$ "
CONFIG_DEBUG=y
CONFIG_CBPRINTF_FP_SUPPORT=y
#CONFIG_ASSERT=y

CONFIG_TT_BIST=n
