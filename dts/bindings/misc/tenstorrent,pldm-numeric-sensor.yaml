description: |
  Child node under a Tenstorrent PLDM PDR provider describing one
  numeric sensor exported via PLDM platform commands.

compatible: "tenstorrent,pldm-numeric-sensor"

include: base.yaml

properties:
  sensor:
    type: phandle
    required: true
    description: Referenced sensor device.

  channel-type:
    type: int
    required: true
    min: 0
    max: 255
    description: Sensor channel type (SENSOR_CHAN_* value).

  channel-index:
    type: int
    required: true
    min: 0
    max: 255
    description: Sensor channel index for multi-channel devices.

  sensor-id:
    type: int
    required: true
    min: 0
    max: 65535
    description: PLDM sensor ID for this channel.

  entity-type:
    type: int
    default: 135
    min: 0
    max: 65535
    description: PLDM entity type.

  entity-instance:
    type: int
    default: 1
    min: 0
    max: 65535
    description: PLDM entity instance.

  container-id:
    type: int
    default: 0
    min: 0
    max: 65535
    description: PLDM entity container ID.

  base-unit:
    type: int
    min: 0
    max: 255
    description: Optional explicit PLDM base unit.

  unit-modifier:
    type: int
    default: 0
    min: -128
    max: 127
    description: PLDM unit modifier.

  sensor-name:
    type: string
    description: Optional ASCII auxiliary sensor name. The driver encodes this
      value as UTF-16BE when building the PLDM auxiliary-names PDR.
