description: |
  Tenstorrent SMC remote processor

compatible: "tenstorrent,smc-remoteproc"

include: [i3c-device.yaml]

properties:
  boot-gpios:
    type: phandle-array
    description: |
      Optional GPIO used to signal when the remote processor ROM is ready.
      If omitted, the driver skips GPIO wait and does not perform an
      additional DAA during initialization.
